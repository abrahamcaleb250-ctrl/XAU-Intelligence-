<!DOCTYPE html>
<html>
<head>
    <title>Trading Journal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- =============================== -->
<!-- Floating Menu Bubble -->
<!-- =============================== -->

<div id="menuBubble"></div>

<!-- =============================== -->
<!-- Hidden Navigation -->
<!-- =============================== -->

<div id="sideMenu">

    <div class="menu-item" id="navDashboard">Dashboard</div>

    <div class="menu-item" id="navJournal">Journal</div>

    <div class="menu-item" id="navHistory">Trade History</div>

    <div class="menu-item" id="navConsistency">Consistency</div>

    <div class="menu-item" id="navNews">News</div>

    <div class="menu-item" id="navSettings">Settings</div>

</div>

<div id="overlay"></div>

<h1>📒 Trading Journal</h1>

<p>Record every trade and let the AI learn from your performance.</p>

<hr>

<div class="signal-card">

<h2>➕ Add Trade</h2>

<input id="pair" type="text" placeholder="Pair (XAUUSD)"><br><br>

<input id="entry" type="number" placeholder="Entry Price"><br><br>

<input id="sl" type="number" placeholder="Stop Loss"><br><br>

<input id="tp" type="number" placeholder="Take Profit"><br><br>

<select id="result">
    <option value="WIN">WIN</option>
    <option value="LOSS">LOSS</option>
</select>

<br><br>

<button onclick="saveTrade()">Save Trade</button>

</div>

<hr>

<div class="signal-card">

<h2>🤖 AI Learning Statistics</h2>

<p>Total Trades:
<span id="totalTrades">0</span></p>

<p>Winning Trades:
<span id="winningTrades">0</span></p>

<p>Losing Trades:
<span id="losingTrades">0</span></p>

<p>Win Rate:
<span id="winRate">0%</span></p>

<p>Confidence Bonus:
<span id="confidenceBonus">0%</span></p>

</div>

<script>

function saveTrade(){

const trade={

pair:document.getElementById("pair").value,

entry:document.getElementById("entry").value,

sl:document.getElementById("sl").value,

tp:document.getElementById("tp").value,

result:document.getElementById("result").value

};

LearningEngine.learn(trade);

updateStats();

}

function updateStats(){

document.getElementById("totalTrades").innerHTML=LearningEngine.totalTrades || 0;

document.getElementById("winningTrades").innerHTML=LearningEngine.winningTrades || 0;

document.getElementById("losingTrades").innerHTML=LearningEngine.losingTrades || 0;

document.getElementById("winRate").innerHTML=(LearningEngine.winRate || 0)+"%";

document.getElementById("confidenceBonus").innerHTML=(LearningEngine.confidenceBonus || 0)+"%";

}

updateStats();

</script>

<script src="database.js"></script>
<script src="learning-engine.js"></script>
<script src="navigation.js"></script>

</body>
</html>
