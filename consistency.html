<!DOCTYPE html>
<html>
<head>
    <title>Consistency Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="menuBubble"></div>

<div id="sideMenu">

<div class="menu-item" id="navDashboard">Dashboard</div>
<div class="menu-item" id="navJournal">Journal</div>
<div class="menu-item" id="navHistory">Trade History</div>
<div class="menu-item" id="navConsistency">Consistency</div>
<div class="menu-item" id="navNews">News</div>
<div class="menu-item" id="navSettings">Settings</div>

</div>

<div id="overlay"></div>

<h1>🔥 Consistency Tracker</h1>

<p>Build discipline one day at a time.</p>

<hr>

<div class="signal-card">

<h2>📊 Performance</h2>

<p>Current Streak:
<span id="currentStreak">0</span></p>

<p>Longest Streak:
<span id="longestStreak">0</span></p>

<p>Trading Days:
<span id="days">0</span></p>

<p>Missed Days:
<span id="missedDays">0</span></p>

<p>Consistency:
<span id="consistency">0%</span></p>

</div>

<hr>

<div class="signal-card">

<h2 id="monthTitle">📅 June 2026</h2>

<div style="display:flex;justify-content:space-between;margin-bottom:20px;">

<button onclick="previousMonth()">⬅</button>

<button onclick="nextMonth()">➡</button>

</div>

<div id="calendar"></div>

</div>

<hr>

<div class="signal-card">

<h2>🥧 Consistency Chart</h2>

<canvas id="consistencyChart"></canvas>

</div>

<hr>

<div class="signal-card">

<h2>🤖 AI Reminder</h2>

<p id="reminderText">

You haven't missed any day.

</p>

</div>

<script>

const calendar = document.getElementById("calendar");

let currentMonth=new Date().getMonth();

let currentYear=new Date().getFullYear();

const months=[
"January","February","March","April","May","June",
"July","August","September","October","November","December"
];

function updateMonthTitle(){

document.getElementById("monthTitle").innerHTML=
"📅 "+months[currentMonth]+" "+currentYear;

}

function previousMonth(){

currentMonth--;

if(currentMonth<0){

currentMonth=11;

currentYear--;

}

updateMonthTitle();

}

function nextMonth(){

currentMonth++;

if(currentMonth>11){

currentMonth=0;

currentYear++;

}

updateMonthTitle();

}

for(let i=1;i<=31;i++){

const day=document.createElement("button");

day.innerHTML=i;

day.className="calendar-day";

day.onclick=function(){

LearningEngine.markToday();

updateConsistency();

this.style.background="#00C853";

this.style.color="white";

};

calendar.appendChild(day);

}

function updateConsistency(){

document.getElementById("currentStreak").innerHTML=LearningEngine.currentStreak;

document.getElementById("longestStreak").innerHTML=LearningEngine.longestStreak;

document.getElementById("days").innerHTML=LearningEngine.tradingDays;

document.getElementById("missedDays").innerHTML=LearningEngine.missedDays;

document.getElementById("consistency").innerHTML=

LearningEngine.getConsistency()+"%";

}

updateConsistency();
updateMonthTitle();

</script>

<script src="database.js"></script>
<script src="learning-engine.js"></script>
<script src="navigation.js"></script>
</body>
</html>
